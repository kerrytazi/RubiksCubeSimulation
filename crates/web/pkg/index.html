<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rubiks Cube Simulation Web</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
		}
		canvas {
			display: block;
		}
	</style>
</head>
<body>
	<canvas id="canvas"></canvas>
	<script type="module">
		import init, { main_web } from './wasm/web.js';

		// God forbid web development
		window.addEventListener('unhandledrejection', (event) => {
			const reasonString = String(event.reason);
			if (reasonString.includes("Using exceptions for control flow")) {
				event.preventDefault();
			}
		});

		init().then(main_web);
	</script>
</body>
</html>
